<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Target Goals | Apex Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-wallet brand-icon"></i>
                <h2><span id="app-brand-text-render">ApexFinance</span></h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span></a>
                <a href="analytics.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> <span data-i18n="analytics">Analytics</span></a>
                <a href="budgets.html" class="nav-item"><i class="fa-solid fa-scale-balanced"></i> <span data-i18n="budgets">Budgets</span></a>
                <a href="goals.html" class="nav-item active"><i class="fa-solid fa-bullseye"></i> <span data-i18n="goals">Goals</span></a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> <span data-i18n="settings">Settings</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1 data-i18n="longTermGoals">Long-term Savings Milestones</h1>
                <button class="btn btn-primary" id="open-goal-modal-btn"><i class="fa-solid fa-plus"></i> <span data-i18n="initMilestone">Initialize Milestone Goal</span></button>
            </header>
            <div class="budgets-panel-layout" id="goals-anchor-row"></div>
        </main>
    </div>

    <div class="modal-overlay" id="goal-modal">
        <div class="modal-content glass-card">
            <div class="modal-header"><h3>Initialize Vault Goal</h3><button class="close-modal-btn" id="close-goal-modal-btn">&times;</button></div>
            <form id="goal-creation-form" class="standard-form">
                <div class="form-group"><label>Goal Name</label><input type="text" id="goal-name-field" required placeholder="..."></div>
                <div class="form-group"><label>Target Allocation Ceiling ($)</label><input type="number" id="goal-target-field" required></div>
                <div class="form-group"><label>Currently Funded Injection ($)</label><input type="number" id="goal-current-field" value="0"></div>
                <button type="submit" class="btn btn-submit-action w-100">Provision Milestone Vault</button>
            </form>
        </div>
    </div>
    <script src="js/storage.js" type="module"></script>
    <script src="js/ui.js" type="module"></script>
    <script src="js/goals.js" type="module"></script>
</body>
</html>
