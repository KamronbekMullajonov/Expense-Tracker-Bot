<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Apex Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/analytics.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area"><i class="fa-solid fa-wallet brand-icon"></i><h2>Apex<span>Finance</span></h2></div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="analytics.html" class="nav-item active"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <a href="budgets.html" class="nav-item"><i class="fa-solid fa-scale-balanced"></i> Budgets</a>
                <a href="goals.html" class="nav-item"><i class="fa-solid fa-bullseye"></i> Goals</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-header"><h1>Visual Advanced Analytics</h1><p>Deep-dive pattern breakdowns across distributions.</p></header>
            <div class="charts-grid-layout">
                <div class="chart-card glass-card"><h3>Expense Distribution Profile</h3><div class="canvas-box"><canvas id="pieDistributionChart"></canvas></div></div>
                <div class="chart-card glass-card"><h3>Monthly Dynamic Run Rates</h3><div class="canvas-box"><canvas id="barRunRateChart"></canvas></div></div>
                <div class="chart-card glass-card wide-span"><h3>Macro Cash Flow Historical Vector</h3><div class="canvas-box"><canvas id="lineTimelineChart"></canvas></div></div>
            </div>
        </main>
    </div>
    <script src="js/storage.js" type="module"></script>
    <script src="js/charts.js" type="module"></script>
    <script src="js/analytics.js" type="module"></script>
</body>
</html>
